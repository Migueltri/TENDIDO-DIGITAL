    <!-- Contenedor donde aparecerán las noticias -->
<div id="noticias-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <p class="text-gray-500">Cargando últimas noticias...</p>
</div>

<!-- Script que lee el db.json y crea las tarjetas -->
<script>
document.addEventListener("DOMContentLoaded", function() {
    // El "?t=" + Date.now() es el TRUCO MÁGICO para evitar la caché. 
    // Obliga a la web a descargar las noticias nuevas siempre.
    fetch('/data/db.json?t=' + Date.now())
        .then(response => response.json())
        .then(data => {
            const grid = document.getElementById('noticias-grid');
            grid.innerHTML = ''; // Limpiamos el mensaje de "Cargando..."

            // 1. Filtrar SOLO las noticias activas (las del tick verde)
            const noticiasActivas = data.articles.filter(n => n.isPublished === true);

            // 2. Ordenar de más nueva a más antigua
            noticiasActivas.sort((a, b) => new Date(b.date).getTime() - new Date(a.date).getTime());

            // 3. Crear las tarjetas HTML
            noticiasActivas.forEach(noticia => {
                // Formatear la fecha (ej: 25 de Febrero de 2026)
                const fecha = new Date(noticia.date).toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' });

                // Crear la tarjeta con tu diseño exacto
                const tarjeta = `
                    <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 flex flex-col">
                        <div class="relative h-56">
                            <img src="${noticia.imageUrl}" class="w-full h-full object-cover" alt="${noticia.title}">
                            <span class="absolute top-4 left-4 bg-red-600 text-white px-3 py-1 rounded-full text-xs font-bold">
                                ${noticia.category}
                            </span>
                        </div>
                        <div class="p-6 flex flex-col flex-grow">
                            <p class="text-gray-400 text-sm mb-2">${fecha}</p>
                            <h3 class="text-xl font-bold text-gray-900 mb-3 leading-tight">${noticia.title}</h3>
                            <p class="text-gray-600 text-sm mb-4 flex-grow line-clamp-3">${noticia.summary}</p>
                            <a href="/noticia.html?id=${noticia.id}" class="text-red-600 font-bold text-sm flex items-center gap-1 hover:text-red-700">
                                Leer más <span class="text-lg">→</span>
                            </a>
                        </div>
                    </div>
                `;
                grid.innerHTML += tarjeta;
            });
        })
        .catch(error => {
            console.error("Error cargando noticias:", error);
            document.getElementById('noticias-grid').innerHTML = '<p>Error al cargar las noticias.</p>';
        });
});
</script>
